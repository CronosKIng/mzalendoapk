name: Build APK (Gradle 8.2)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # Hatua hii ni muhimu ili kufungua leseni za SDK
    - name: Accept Android SDK Licenses
      run: |
        mkdir -p "${ANDROID_HOME}/licenses"
        echo -e "\n8933bad161af4178b1185d1a37fbf41ea5261c55" > "${ANDROID_HOME}/licenses/android-sdk-license"
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8edd" > "${ANDROID_HOME}/licenses/android-sdk-preview-license"

    - name: Install Gradle 8.2
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
        unzip -q gradle-8.2-bin.zip
        echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH

    - name: Build APK
      run: |
        # Unatumia 'gradle' uliyoipakua, hakikisha kodi zako ziko tayari
        gradle assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Alfarooj-APK
        path: app/build/outputs/apk/debug/*.apk
