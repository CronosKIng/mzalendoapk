name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Android SDK and accept licenses
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        mkdir -p $ANDROID_HOME
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip -d $ANDROID_HOME
        mv $ANDROID_HOME/cmdline-tools $ANDROID_HOME/latest
        mkdir -p $ANDROID_HOME/cmdline-tools
        mv $ANDROID_HOME/latest $ANDROID_HOME/cmdline-tools/
        
        # Accept licenses manually
        mkdir -p $ANDROID_HOME/licenses
        echo "8933bad161af4178b1185d1a37fbf41ea5261c55" > $ANDROID_HOME/licenses/android-sdk-license
        echo "84831b9409646a918e30573bab4c9c91346d8edd" > $ANDROID_HOME/licenses/android-sdk-preview-license
        
        # Install packages
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3" > /dev/null 2>&1 || true
        
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV

    - name: Build APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
      env:
        ANDROID_HOME: $HOME/android-sdk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MzalendoApp
        path: app/build/outputs/apk/debug/*.apk
