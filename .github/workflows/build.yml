name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android SDK Licenses
      run: |
        yes | sdkmanager --licenses || true
        yes | sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" || true

    - name: Install Gradle 8.2
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
        unzip -q gradle-8.2-bin.zip
        echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH

    - name: Build APK
      run: |
        gradle assembleDebug --no-daemon
      env:
        JAVA_OPTS: "-Xmx1024m"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MzalendoApp
        path: app/build/outputs/apk/debug/*.apk
